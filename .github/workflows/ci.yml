name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install ruff mypy bandit pip-audit pytest

      - name: Run release verification gate
        env:
          RUN_PIP_AUDIT: "1"
        run: pwsh -ExecutionPolicy Bypass -File scripts/verify_release.ps1 -q

      - name: Publish CI step summary
        if: always()
        run: python scripts/write_ci_step_summary.py

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-reports
          path: .verify_reports/*

      - name: Upload distribution artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: distribution-artifacts
          path: .dist_verify/*

      - name: Upload release handoff bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-handoff-bundle
          path: .release_bundle/*
